services:
  - type: web
    name: smash-pass-trash
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: spt-db
          property: connectionString

databases:
  - name: spt-db
    plan: free
